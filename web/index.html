<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLI-FP: False Positive Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-flask-vial"></i> SQLI-FP Viewer
            </span>
            <button class="btn btn-primary btn-sm" onclick="openUploadModal()">
                <i class="fas fa-upload"></i> Upload XML Report
            </button>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Dashboard Summary -->
        <div class="row mb-4" id="dashboard" style="display: none;">
            <div class="col-md-3">
                <div class="card text-center bg-light">
                    <div class="card-body">
                        <h5 class="card-title">Total Findings</h5>
                        <h2 class="card-text text-primary" id="totalFindings">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-light">
                    <div class="card-body">
                        <h5 class="card-title">True Positives</h5>
                        <h2 class="card-text text-danger" id="truePositives">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-light">
                    <div class="card-body">
                        <h5 class="card-title">False Positives</h5>
                        <h2 class="card-text text-warning" id="falsePositives">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-light">
                    <div class="card-body">
                        <h5 class="card-title">Success Rate</h5>
                        <h2 class="card-text text-success" id="successRate">0%</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="card mb-4" id="filtersCard" style="display: none;">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <label class="form-label">Search URL</label>
                        <input type="text" class="form-control" id="searchUrl" placeholder="Filter by URL...">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="filterStatus">
                            <option value="">All</option>
                            <option value="true_positive">True Positive</option>
                            <option value="false_positive">False Positive</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">HTTP Method</label>
                        <select class="form-select" id="filterMethod">
                            <option value="">All</option>
                            <option value="GET">GET</option>
                            <option value="POST">POST</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Confidence</label>
                        <select class="form-select" id="filterConfidence">
                            <option value="">All</option>
                            <option value="certain">Certain</option>
                            <option value="firm">Firm</option>
                            <option value="tentative">Tentative</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex align-items-end gap-2">
                        <button class="btn btn-secondary w-100" onclick="resetFilters()">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                        <button class="btn btn-success w-100" onclick="exportResults()">
                            <i class="fas fa-download"></i> Export
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Findings Table -->
        <div class="card" id="findingsCard" style="display: none;">
            <div class="card-header">
                <h5 class="mb-0">Findings</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover mb-0" id="findingsTable">
                        <thead class="table-dark">
                            <tr>
                                <th>Status</th>
                                <th>URL</th>
                                <th>Parameter</th>
                                <th>Method</th>
                                <th>Confidence</th>
                                <th>Verdict</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="findingsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="alert alert-info text-center" id="emptyState">
            <i class="fas fa-inbox fa-2x mb-3"></i>
            <h5>No XML report loaded</h5>
            <p>Click "Upload XML Report" to get started</p>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Finding Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailModalBody">
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal fade" id="uploadModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Upload XML Report</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="xmlFile" class="form-label">Select XML File</label>
                        <input type="file" class="form-control" id="xmlFile" accept=".xml">
                    </div>
                    <div id="uploadError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="handleFileUpload()">Upload</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
